<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B10 (Base-4096)</title>
    <style>
        :root {
            --bg-color: #050508;
            --container-bg: #0f111a;
            --text-color: #e2e8f0;
            --accent-color: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --input-bg: #161825;
            --border-color: #2a2d45;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--accent-glow);
            text-align: center;
            margin-bottom: 5px;
            font-size: 2.2em;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.5;
            max-width: 650px;
        }

        .panels-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--container-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-color);
            flex: 1;
            min-width: 300px;
            max-width: 450px;
        }

        .card-title {
            text-align: center;
            color: #fff;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .input-group label {
            margin-bottom: 8px;
            font-size: 1.05em;
            color: #94a3b8;
        }

        input[type="text"] {
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            color: #fff;
            padding: 12px;
            font-size: 1.3em;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        input.error-glow {
            border-color: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.3);
        }

        .color-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="color"] {
            appearance: none;
            -webkit-appearance: none;
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid var(--border-color); border-radius: 8px; }

        /* Новые стили селектов под твой дизайн */
        .custom-select {
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            color: #fff;
            padding: 10px;
            font-size: 0.95em;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .custom-select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* Новые стили панели статов под твой дизайн */
        .stats-box {
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9em;
            color: #94a3b8;
        }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .stat-highlight { color: #fff; font-weight: 600; }
        .stat-win { color: #22c55e; font-weight: bold; } 
        .stat-warning { color: #eab308; font-weight: bold; } 
        .binary-dump {
            font-family: 'Consolas', monospace;
            font-size: 0.85em;
            color: #38bdf8; 
            word-break: break-all;
            text-align: right;
            max-width: 200px;
            line-height: 1.3;
        }
        .stat-conclusion {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border-color);
            text-align: center;
            font-size: 1.1em;
            font-weight: bold;
            color: #e2e8f0;
            letter-spacing: 0.5px;
        }

        h2 { margin-top: 10px; color: #cbd5e1; font-size: 1.3em;}
        
        .dictionary {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 6px;
            width: 100%;
            max-width: 1100px;
            max-height: 600px;
            overflow-y: auto;
            margin-bottom: 40px;
            padding-right: 10px;
        }

        /* Кастомизация скроллбара для словаря */
        .dictionary::-webkit-scrollbar { width: 8px; }
        .dictionary::-webkit-scrollbar-track { background: var(--container-bg); border-radius: 4px; }
        .dictionary::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 4px; }

        .dict-item {
            background-color: var(--container-bg);
            padding: 8px 4px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: transform 0.1s, border-color 0.1s;
        }
        .dict-item:hover {
            transform: scale(1.2);
            border-color: var(--accent-color);
            z-index: 10;
            background-color: var(--input-bg);
        }
        .dict-symbol { font-size: 1.4em; color: var(--accent-color); margin-bottom: 4px; }
        .dict-number { font-size: 0.65em; color: #64748b; }
    </style>
</head>
<body>

    <!-- ПОДКЛЮЧЕНИЕ МАССИВА СИМВОЛОВ ИЗ ВНЕШНЕГО ФАЙЛА -->
    <script src="symbols.js"></script>

    <h1>переводчик B10 (Base-4096)</h1>
    <p class="subtitle">Позиционная 4096-ричная система. 1 символ = 12 бит данных.<br>Любой RGB цвет (16 миллионов оттенков) записывается ровно <b>двумя</b> символами!</p>

    <div class="panels-wrapper">
        <!-- Левая карточка: Числа и Дроби -->
        <div class="card">
            <h3 class="card-title">Числа и Дроби</h3>
            <div class="input-group">
                <label>Десятичные (наши числа):</label>
                <input type="text" id="decimalInput" placeholder="Например: 1024.5">
            </div>
            <div class="input-group">
                <label>B10 (Base-4096):</label>
                <input type="text" id="customInput" placeholder="Введите символ">
            </div>
        </div>

        <!-- Правая карточка: Магия Цвета -->
        <div class="card">
            <h3 class="card-title">RGB Конвертер Цвета</h3>
            <div class="input-group">
                <label>Выбери цвет (HEX/RGB):</label>
                <div class="color-row">
                    <input type="color" id="colorPicker" value="#a855f7">
                    <input type="text" id="colorHex" value="#A855F7" style="flex: 1;" maxlength="7">
                </div>
            </div>
            <div class="input-group">
                <label>RGB формат:</label>
                <input type="text" id="colorRgb" value="rgb(168, 85, 247)">
            </div>
            <div class="input-group">
                <label>Цвет в B10 (ровно 2 знака):</label>
                <input type="text" id="colorBase4096" placeholder="Двузначный код">
            </div>

            <!-- Блок с настройками и статами -->
            <div class="input-group" style="margin-bottom: 0;">
                <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                    <select id="encodingSelect" class="custom-select" style="flex: 1;">
                        <option value="utf8" selected>Кодировка: UTF-8</option>
                        <option value="utf16">Кодировка: UTF-16</option>
                    </select>
                    <select id="unitSelect" class="custom-select" style="flex: 1;">
                        <option value="bytes">В байтах</option>
                        <option value="bits" selected>В битах</option>
                    </select>
                </div>
                <div class="stats-box" id="sizeStats">
                    <!-- Сюда подгрузится статистика -->
                </div>
            </div>
        </div>
    </div>

    <h2>Словарь (0 — 4095)</h2>
    <div class="dictionary" id="dictionary"></div>

    <script>
        const BASE = 4096n; 
        
        // Математические элементы
        const decimalInput = document.getElementById('decimalInput');
        const customInput = document.getElementById('customInput');
        
        // Цветовые элементы
        const colorPicker = document.getElementById('colorPicker');
        const colorHex = document.getElementById('colorHex');
        const colorRgb = document.getElementById('colorRgb');
        const colorBase4096 = document.getElementById('colorBase4096');

        const encodingSelect = document.getElementById('encodingSelect');
        const unitSelect = document.getElementById('unitSelect');
        const sizeStats = document.getElementById('sizeStats');

        // Шпаргалка для тестирования
        if (typeof symbols === 'undefined') {
            window.symbols = Array.from({length: 4096}, (_, i) => String.fromCharCode(19968 + i));
        }

        const dictionaryContainer = document.getElementById('dictionary');
        const fragment = document.createDocumentFragment();
        symbols.forEach((sym, index) => {
            const div = document.createElement('div');
            div.className = 'dict-item';
            div.innerHTML = `<div class="dict-symbol">${sym}</div><div class="dict-number">${index}</div>`;
            fragment.appendChild(div);
        });
        dictionaryContainer.appendChild(fragment);

        // ================= ЧИСЛОВОЙ КОНВЕРТЕР =================
        function toCustomBase(numStr) {
            let [intStr, fracStr] = numStr.split('.');
            let resultInt = "0";
            
            if (intStr) {
                try {
                    let n = BigInt(intStr);
                    resultInt = "";
                    if (n === 0n) resultInt = symbols[0];
                    while (n > 0n) {
                        let remainder = Number(n % BASE);
                        resultInt = symbols[remainder] + resultInt;
                        n = n / BASE;
                    }
                } catch (e) { resultInt = "0"; }
            } else { resultInt = symbols[0]; }

            let resultFrac = "";
            if (fracStr) {
                let f = parseFloat("0." + fracStr);
                let limit = 4;
                while (f > 0.000000001 && resultFrac.length < limit) {
                    f *= 4096;
                    let digit = Math.floor(f + 1e-10);
                    if (digit > 4095) digit = 4095;
                    resultFrac += symbols[digit];
                    f -= digit;
                }
            }
            return resultFrac.length > 0 ? resultInt + "." + resultFrac : resultInt;
        }

        function toDecimalBase(str) {
            let [intStr, fracStr] = str.split('.');
            
            let totalInt = 0n;
            let intChars = Array.from(intStr || symbols[0]);
            for (let char of intChars) {
                let val = symbols.indexOf(char);
                if (val === -1) return null;
                totalInt = totalInt * BASE + BigInt(val);
            }
            let result = totalInt.toString();

            if (fracStr) {
                let fracChars = Array.from(fracStr);
                let fracDecimal = 0;
                let divisor = 4096;
                
                for (let char of fracChars) {
                    let val = symbols.indexOf(char);
                    if (val === -1) return null;
                    fracDecimal += val / divisor;
                    divisor *= 4096;
                }
                
                if (fracDecimal > 0) {
                    let cleanFrac = parseFloat(fracDecimal.toFixed(10)).toString();
                    if (cleanFrac.includes('.')) {
                        result += "." + cleanFrac.split('.')[1];
                    }
                }
            }
            return result;
        }

        decimalInput.addEventListener('input', () => {
            let val = decimalInput.value.replace(/,/g, '.').replace(/[^\d.]/g, '');
            let parts = val.split('.');
            if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
            decimalInput.value = val;
            
            if (!val) { customInput.value = ''; return; }
            let res = toCustomBase(val);
            if (val.endsWith('.')) res += '.';
            customInput.value = res;
        });

        customInput.addEventListener('input', () => {
            let val = customInput.value.replace(/\s+/g, '').replace(/,/g, '.');
            let parts = val.split('.');
            if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
            customInput.value = val;
            
            if (!val) { decimalInput.value = ''; return; }
            let decimalVal = toDecimalBase(val);
            if (decimalVal !== null) {
                if (val.endsWith('.')) decimalVal += '.';
                decimalInput.value = decimalVal;
            }
        });

        // ================= ЦВЕТОВОЙ КОНВЕРТЕР И СТАТИСТИКА =================
        function hexToRgbStr(hex) {
            let colorInt = parseInt(hex.replace('#', ''), 16);
            if (isNaN(colorInt)) return '';
            let r = (colorInt >> 16) & 255;
            let g = (colorInt >> 8) & 255;
            let b = colorInt & 255;
            return `rgb(${r}, ${g}, ${b})`;
        }

        function rgbStrToHex(rgbStr) {
            let match = rgbStr.match(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/i);
            if (!match) return null;
            let r = parseInt(match[1]), g = parseInt(match[2]), b = parseInt(match[3]);
            if (r > 255 || g > 255 || b > 255) return null;
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
        }

        function hexToMystic(hex) {
            hex = hex.replace('#', '');
            let colorInt = parseInt(hex, 16);
            if (isNaN(colorInt)) return '';
            let s1 = (colorInt >> 12) & 0xFFF;
            let s2 = colorInt & 0xFFF;
            return symbols[s1] + symbols[s2];
        }

        function mysticToHex(mysticStr) {
            let chars = Array.from(mysticStr);
            if (chars.length !== 2) return null;
            let s1 = symbols.indexOf(chars[0]);
            let s2 = symbols.indexOf(chars[1]);
            if (s1 === -1 || s2 === -1) return null;
            let colorInt = (s1 << 12) | s2;
            return '#' + colorInt.toString(16).padStart(6, '0').toUpperCase();
        }

        function getByteSize(str, encoding) {
            if (encoding === 'utf8') {
                return new TextEncoder().encode(str).length;
            } else {
                return str.length * 2;
            }
        }

        function getBinaryDump(str, encoding) {
            let binStr = "";
            if (encoding === 'utf8') {
                let bytes = new TextEncoder().encode(str);
                bytes.forEach(b => {
                    binStr += b.toString(2).padStart(8, '0') + " ";
                });
            } else {
                for (let i = 0; i < str.length; i++) {
                    binStr += str.charCodeAt(i).toString(2).padStart(16, '0') + " ";
                }
            }
            return binStr.trim() || "0";
        }

        function updateStats() {
            let hex = colorHex.value;
            let rgb = colorRgb.value;
            let b10 = colorBase4096.value;
            
            let enc = encodingSelect.value;
            let unit = unitSelect.value;
            
            let hBytes = getByteSize(hex, enc);
            let rBytes = getByteSize(rgb, enc);
            let bBytes = getByteSize(b10, enc);
            
            let hVal = unit === 'bits' ? hBytes * 8 : hBytes;
            let rVal = unit === 'bits' ? rBytes * 8 : rBytes;
            let bVal = unit === 'bits' ? bBytes * 8 : bBytes;
            
            let payloadVal = unit === 'bits' ? (b10.length * 12) : (b10.length * 12 / 8);
            let uLabel = unit === 'bits' ? 'бит' : 'байт';

            let binaryText = getBinaryDump(b10, enc);

            // Динамическое вычисление символов отношения
            let hexSign = hVal > bVal ? "&gt;" : (hVal < bVal ? "&lt;" : "=");
            let rgbSign = rVal > bVal ? "&gt;" : (rVal < bVal ? "&lt;" : "=");

            sizeStats.innerHTML = `
                <div class="stat-line"><span>Текст HEX в памяти:</span> <span class="stat-highlight">${hVal} ${uLabel}</span></div>
                <div class="stat-line"><span>Текст RGB в памяти:</span> <span class="stat-highlight">${rVal} ${uLabel}</span></div>
                <div class="stat-line" style="margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border-color);">
                    <span>Текст B10 в памяти:</span> <span class="stat-warning">${bVal} ${uLabel}</span>
                </div>
                
                <div class="stat-line" style="flex-direction: column; margin-bottom: 12px;">
                    <div style="display:flex; justify-content:space-between; width:100%; align-items: flex-start;">
                        <span style="font-size: 0.9em; color:#64748b;">Бинарник B10:</span>
                        <div class="binary-dump">${binaryText}</div>
                    </div>
                </div>

                <div class="stat-line">
                    <span>Ёмкость цвета (Payload):</span> <span class="stat-win">${payloadVal} ${uLabel}</span>
                </div>
                <div class="stat-conclusion">
                    HEX ${hexSign} B10 &nbsp;&nbsp;|&nbsp;&nbsp; RGB ${rgbSign} B10
                </div>
            `;
        }

        function applyColor(hexStr, source = 'none') {
            if (source !== 'picker') colorPicker.value = hexStr;
            if (source !== 'hex') colorHex.value = hexStr;
            if (source !== 'rgb') {
                colorRgb.value = hexToRgbStr(hexStr);
                colorRgb.classList.remove('error-glow');
            }
            if (source !== 'b10') {
                colorBase4096.value = hexToMystic(hexStr);
                colorBase4096.classList.remove('error-glow');
            }
            updateStats();
        }

        colorPicker.addEventListener('input', (e) => applyColor(e.target.value.toUpperCase(), 'picker'));
        
        colorHex.addEventListener('input', (e) => {
            let val = e.target.value;
            if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
                applyColor(val.toUpperCase(), 'hex');
                colorHex.classList.remove('error-glow');
            } else { colorHex.classList.add('error-glow'); updateStats(); }
        });

        colorRgb.addEventListener('input', (e) => {
            let val = e.target.value;
            let hexStr = rgbStrToHex(val);
            if (hexStr) { applyColor(hexStr, 'rgb'); colorRgb.classList.remove('error-glow'); } 
            else { colorRgb.classList.add('error-glow'); updateStats(); }
        });

        colorBase4096.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\s+/g, '');
            colorBase4096.value = val; 
            let chars = Array.from(val);
            if (chars.length === 2) {
                let hexStr = mysticToHex(val);
                if (hexStr) { applyColor(hexStr, 'b10'); colorBase4096.classList.remove('error-glow'); } 
                else { colorBase4096.classList.add('error-glow'); updateStats(); }
            } else { colorBase4096.classList.add('error-glow'); updateStats(); }
        });

        encodingSelect.addEventListener('change', updateStats);
        unitSelect.addEventListener('change', updateStats);

        // Инициализация стартового цвета
        applyColor('#A855F7');

    </script>
</body>
</html>
